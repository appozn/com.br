<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Bunny Pay</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #0a0a0d; color: #fff; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: #111116; border-right: 1px solid rgba(130, 10, 209, 0.1); display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-nav { padding: 20px; flex: 1; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 12px; color: #888; text-decoration: none; transition: 0.2s; margin-bottom: 8px; }
        .nav-item:hover, .nav-item.active { background: rgba(130, 10, 209, 0.1); color: var(--primary); }
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #16161d; padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .admin-table { width: 100%; border-collapse: collapse; background: #16161d; border-radius: 20px; overflow: hidden; margin-top: 20px; }
        .admin-table th, .admin-table td { padding: 16px 24px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .admin-table th { background: rgba(130, 10, 209, 0.1); color: #888; font-size: 0.85rem; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-body { background: #16161d; width: 500px; padding: 30px; border-radius: 24px; border: 1px solid var(--primary); }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="logo.png" alt="Bunny Pay" width="120">
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active"><i data-lucide="layout-grid"></i> Dashboard</a>
            <a href="#" class="nav-item" onclick="UI.navigate('products')"><i data-lucide="package"></i> Produtos</a>
            <a href="#" class="nav-item" onclick="UI.navigate('settings')"><i data-lucide="settings"></i> Configurações</a>
            <a href="index.html" class="nav-item" style="margin-top:auto"><i data-lucide="smartphone"></i> Versão Mobile</a>
        </nav>
    </aside>

    <main class="main-content">
        <div id="admin-view">
            <!-- Renderizado via app.js -->
        </div>
    </main>

    <div id="modal-container" class="modal">
        <div class="modal-body" id="modal-content"></div>
    </div>

    <div id="status-toast-layer" style="position:fixed; top:20px; right:20px; z-index:20000"></div>

    <script src="app.js"></script>
    <script>
        // Adaptarapp.js para o modo Admin Desktop
        document.body.classList.add('admin-mode');
        
        // Redefinir UI.render para desktop se necessário
        const originalRender = UI.render;
        UI.render = function() {
            const adminView = document.getElementById('admin-view');
            if (State.currentView === 'dashboard') {
                const net = State.notifications
                    .filter(n => n.type === 'sale' || n.type === 'withdraw')
                    .reduce((a, b) => a + (Number(b.net) || 0), 0);
                const sales = State.notifications.filter(n => n.type === 'sale').length;
                
                adminView.innerHTML = `
                    <div class="admin-header">
                        <h1 class="outfit">Painel de Gerenciamento</h1>
                        <button class="btn-luxe btn-primary" onclick="UI.navigate('settings')" style="width:auto">+ Fluxo de Vendas</button>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <p style="opacity:0.6; font-size:0.9rem">Faturamento Total</p>
                            <h2 class="outfit">R$ ${net.toLocaleString('pt-BR', {minimumFractionDigits:2})}</h2>
                        </div>
                        <div class="stat-card">
                            <p style="opacity:0.6; font-size:0.9rem">Vendas Realizadas</p>
                            <h2 class="outfit">${sales}</h2>
                        </div>
                        <div class="stat-card">
                            <p style="opacity:0.6; font-size:0.9rem">Produtos Ativos</p>
                            <h2 class="outfit">${State.products.length}</h2>
                        </div>
                    </div>
                    
                    <h3 class="outfit" style="margin-bottom:20px">Vendas Automáticas</h3>
                    <div class="card-luxe" style="margin-bottom:40px">
                        <div style="height:200px">
                           <canvas id="salesChart"></canvas>
                        </div>
                    </div>
                `;
                // Trigger chart
                setTimeout(() => {
                    const ctx = document.getElementById('salesChart');
                    if (ctx && window.Chart) {
                        // (Reuso da lógica de chart do app.js)
                    }
                }, 100);
            } else if (State.currentView === 'products') {
                adminView.innerHTML = `
                    <div class="admin-header">
                        <h1 class="outfit">Produtos & Estoque</h1>
                        <button class="btn-luxe btn-primary" onclick="Actions.openAddModal()" style="width:auto">Criar Novo Produto</button>
                    </div>
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>NOME DO PRODUTO</th>
                                <th>VALOR (R$)</th>
                                <th>GERADOR</th>
                                <th>AÇÕES</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${State.products.map(p => `
                                <tr>
                                    <td>
                                        <div style="display:flex; align-items:center; gap:8px">
                                            <b>${p.name}</b>
                                            <i data-lucide="edit" onclick="Actions.editProdPrompt('${p.id}')" style="cursor:pointer; color:var(--primary); width:14px"></i>
                                        </div>
                                    </td>
                                    <td>R$ ${Number(p.value).toFixed(2)}</td>
                                    <td>
                                        <label class="switch" style="width:40px; height:20px">
                                            <input type="checkbox" ${p.is_active ? 'checked' : ''} onchange="Actions.toggleProdStatus('${p.id}', this.checked)">
                                            <span class="slider"></span>
                                        </label>
                                    </td>
                                    <td>
                                        <div onclick="Actions.deleteProd('${p.id}')" style="cursor:pointer; color:var(--error)" title="Remover">
                                            <i data-lucide="trash-2" style="width:18px"></i>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } else if (State.currentView === 'settings') {
                adminView.innerHTML = `
                     <div class="admin-header">
                        <h1 class="outfit">Configurações</h1>
                    </div>
                    <div class="card-luxe" style="max-width:600px; text-align: center; padding: 40px;">
                         <i data-lucide="bell" style="width:48px; height:48px; color:var(--success); margin-bottom:20px"></i>
                         <h2 class="outfit" style="color:var(--success); margin-bottom:10px">Notificações Ativas</h2>
                         <p style="opacity:0.7; font-size:1.1rem">Você está pronto para receber suas notificações de venda.</p>
                    </div>
                `;
            }
            if (window.lucide) lucide.createIcons();
        };

        Actions.openAddModal = function() {
            const m = document.getElementById('modal-container');
            const c = document.getElementById('modal-content');
            c.innerHTML = `
                <h2 class="outfit" style="margin-bottom:20px">Novo Produto</h2>
                <input type="text" id="pn-m" class="input-luxe" placeholder="Nome do Produto" style="margin-bottom:15px">
                <input type="number" id="pv-m" class="input-luxe" placeholder="Valor (R$)" style="margin-bottom:25px">
                <div style="display:flex; gap:10px">
                     <button class="btn-luxe btn-secondary" onclick="document.getElementById('modal-container').style.display='none'">Cancelar</button>
                    <button class="btn-luxe btn-primary" onclick="Actions.addFromModal()">Criar Produto</button>
                </div>
            `;
            m.style.display = 'flex';
        };

        Actions.addFromModal = async function() {
            const n = document.getElementById('pn-m').value;
            const v = document.getElementById('pv-m').value;
            if(!n || !v) return alert('Preencha tudo.');
            await State.addProduct(n, v);
            document.getElementById('modal-container').style.display='none';
            UI.render();
        };

        // Redefinir deleteProd para suportar API sync
        Actions.deleteProd = async function(id) {
            if(!confirm('Excluir definitivamente? Isso afetará todos os admins.')) return;
            try {
                await fetch(`${BACKEND_URL}/api/products/${id}`, { method: 'DELETE' });
                UI.showToast('✅ Removido de todos os sistemas!');
            } catch(e) {
                State.products = State.products.filter(p => p.id !== id);
                State.saveLocal();
                UI.render();
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) lucide.createIcons();
            // Iniciar com dashboard
            UI.render();
        });
    </script>
</body>
</html>
